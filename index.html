<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序演算法報告</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: radial-gradient(circle at top left, #eff6ff 0%, #e2e8f0 40%, #f8fafc 100%);
            color: #0f172a;
        }
        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 20px 48px;
            min-height: 100vh;
        }
        .card {
            width: min(760px, 100%);
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            box-shadow: 0 22px 70px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(15, 23, 42, 0.08);
            padding: 32px 28px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 4vw, 3rem);
            text-align: center;
            letter-spacing: 0.03em;
        }
        p {
            color: #475569;
            line-height: 1.75;
            max-width: 700px;
            margin: 0 auto 28px;
            text-align: center;
        }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
            margin-top: 18px;
        }
        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            border-radius: 18px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 14px 26px rgba(15, 23, 42, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .link-card:hover {
            transform: translateY(-3px);
            border-color: rgba(37, 99, 235, 0.25);
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.15);
        }
        .link-card a {
            display: block;
            text-decoration: none;
            color: #0f172a;
            font-weight: 700;
            font-size: 1.05rem;
        }
        .link-card a::after {
            content: "→";
            display: inline-block;
            margin-left: 10px;
            color: #2563eb;
            transition: margin-left 0.2s ease;
        }
        .link-card:hover a::after {
            margin-left: 14px;
        }
        @media (max-width: 640px) {
            .card {
                padding: 24px 18px;
            }
            .link-card {
                min-height: 84px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="card">
            <h1>排序演算法報告</h1>
            <p>探索氣泡、選擇、插入、合併與快速排序演算法。點選下方連結可查看每種排序的原理、Python 範例與互動動畫。</p>
            <div class="link-grid">
                <div class="link-card"><a href="bubble_sort.html">氣泡排序法</a></div>
                <div class="link-card"><a href="selection_sort.html">選擇排序法</a></div>
                <div class="link-card"><a href="insertion_sort.html">插入排序法</a></div>
                <div class="link-card"><a href="merge_sort.html">合併排序法</a></div>
                <div class="link-card"><a href="quick_sort.html">快速排序法</a></div>
            </div>
        </div>
    </div>
</body>
</html>
